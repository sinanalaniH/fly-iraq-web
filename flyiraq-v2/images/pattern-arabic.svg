      <circle cx="50" cy="50" r="20" fill="none" stroke="#C5A55A" stroke-width="0.5" opacity="0.05"/>
      <circle cx="50" cy="50" r="12" fill="none" stroke="#C5A55A" stroke-width="0.5" opacity="0.07"/>
      <!-- Corner motifs -->
      <path d="M0,0 Q15,5 20,20 Q5,15 0,0" fill="none" stroke="#C5A55A" stroke-width="0.5" opacity="0.06"/>
      <path d="M100,0 Q85,5 80,20 Q95,15 100,0" fill="none" stroke="#C5A55A" stroke-width="0.5" opacity="0.06"/>
      <path d="M0,100 Q15,95 20,80 Q5,85 0,100" fill="none" stroke="#C5A55A" stroke-width="0.5" opacity="0.06"/>
      <path d="M100,100 Q85,95 80,80 Q95,85 100,100" fill="none" stroke="#C5A55A" stroke-width="0.5" opacity="0.06"/>
