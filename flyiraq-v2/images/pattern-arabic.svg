<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <pattern id="arabic-geo" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Islamic geometric star pattern -->
      <polygon points="50,5 61,39 95,39 67,59 78,93 50,73 22,93 33,59 5,39 39,39" 
               fill="none" stroke="#C5A55A" stroke-width="0.5" opacity="0.08"/>
      <polygon points="50,15 58,40 85,40 63,55 71,80 50,65 29,80 37,55 15,40 42,40" 
